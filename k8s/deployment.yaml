apiVersion: apps/v1
kind: Deployment
metadata:
  name: casino-backend
  labels:
    app: casino-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: casino-backend
  template:
    metadata:
      labels:
        app: casino-backend
    spec:
      containers:
      - name: casino-backend
        image: nginx 
        ports:
        - containerPort: 3000
        envFrom:
        - secretRef:
            name: casino-secrets
        resources:
          requests:
            cpu: "100m"
            memory: "256Mi"
          limits:
            cpu: "250m"
            memory: "512Mi"
        livenessProbe:
          httpGet:
            path: /livez
            port: 3000
          initialDelaySeconds: 10
          periodSeconds: 15
        readinessProbe:
          httpGet:
            path: /readyz
            port: 3000
          initialDelaySeconds: 10
          periodSeconds: 10
